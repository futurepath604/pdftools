<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - Secure PDF Tools Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; color: #2d3748; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #dd6b20; margin-bottom: 10px; }
        .drop-zone { border: 2px dashed #dd6b20; padding: 40px 20px; border-radius: 8px; background: #fffaf0; cursor: pointer; margin: 20px 0; }
        .drop-zone:hover { background: #feebc8; }
        input[type="text"], button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 1rem; }
        button { background: #dd6b20; color: white; font-weight: bold; border: none; cursor: pointer; display: none; }
        button:hover { background: #c05621; }
        .status { margin-top: 15px; font-weight: bold; color: #4a5568; }
        .back-link { margin-top: 20px; display: inline-block; color: #4a90e2; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>✂️ Split PDF</h1>
    <p>একটি বড় পিডিএফ ফাইল থেকে নির্দিষ্ট পেজগুলো আলাদা করে নিন।</p>
    <div class="drop-zone" id="dropZone">
        <p>আপনার PDF ফাইলটি ড্র্যাগ করে ছাড়ুন অথবা ক্লিক করুন</p>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        <div id="fileName" style="margin-top: 10px; font-weight: bold;"></div>
    </div>
    <div id="configArea" style="display:none; text-align: left;">
        <label>কোন পেজগুলো আলাদা করতে চান? (যেমন: 1, 3, 5):</label>
        <input type="text" id="pagesInput" placeholder="Enter page numbers separated by commas">
        <button id="submitBtn">SPLIT PDF</button>
    </div>
    <div class="status" id="statusMsg"></div>
    <a href="/" class="back-link">← Back to Dashboard</a>
</div>
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const configArea = document.getElementById('configArea');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    let selectedFile = null;

    dropZone.click = () => fileInput.click();
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if(e.target.files.length > 0) handleFile(e.target.files[0]); });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#feebc8'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '#fffaf0');
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); if(e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); });

    function handleFile(file) {
        if (file.type !== "application/pdf") return alert("Only PDF supported!");
        selectedFile = file;
        fileName.innerText = `Selected: ${file.name}`;
        configArea.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    submitBtn.addEventListener('click', async () => {
        const rawPages = document.getElementById('pagesInput').value;
        if(!rawPages) return alert("Please specify pages.");
        
        // Convert to 0-indexed integer list for backend logic[span_2](start_span)[span_2](end_span)
        const pageArr = rawPages.split(',').map(p => parseInt(p.trim()) - 1).filter(p => !isNaN(p));
        
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('mode', 'split');[span_3](start_span)[span_3](end_span)
        formData.append('params', JSON.stringify({ pages: pageArr }));[span_4](start_span)[span_4](end_span)

        statusMsg.innerText = "Processing split...";
        try {
            const response = await fetch('/api/modify-pdf', { method: 'POST', body: formData });[span_5](start_span)[span_5](end_span)
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `split_${selectedFile.name}`; a.click();
            statusMsg.innerHTML = "<span style='color: green;'>Success!</span>";
        } catch(e) { statusMsg.innerHTML = "<span style='color: red;'>Error processing file.</span>"; }
    });
</script>
</body>
</html>
