<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-4">Compress PDF</h1>
        <input type="file" id="file-input" class="mb-4 block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" accept=".pdf">
        <button id="submit-btn" class="w-full bg-indigo-600 text-white py-2 rounded-xl">Compress Now</button>
        <p id="status" class="mt-4 text-sm"></p>
    </div>

    <script>
        document.getElementById('submit-btn').onclick = async () => {
            const file = document.getElementById('file-input').files[0];
            if (!file) return alert("Select file");
            
            const status = document.getElementById('status');
            status.innerText = "Processing...";
            
            const formData = new FormData();
            formData.append('file', file);
            
            // একই ডোমেইন হওয়ায় কোনো CORS সমস্যা নেই
            const res = await fetch('/api/compress', { method: 'POST', body: formData });
            
            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "compressed_" + file.name;
                a.click();
                status.innerText = "Done!";
            } else {
                status.innerText = "Error!";
            }
        };
    </script>
</body>
</html>
