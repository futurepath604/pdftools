<!DOCTYPE html>
<html lang="en">
<head>

        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #319795; margin-bottom: 10px; }

        .drop-zone:hover { background: #b2f5ea; }
        input[type="password"], button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 1rem; }
        button { background: #319795; color: white; font-weight: bold; border: none; cursor: pointer; display: none; }
        button:hover { background: #234e52; }

</head>
<body>
<div class="container">
    <h1>🔒 Protect / Lock PDF</h1>
    <p>আপনার গোপনীয় ও গুরুত্বপূর্ণ পিডিএফে পাসওয়ার্ড প্রটেকশন যুক্ত করুন।</p>
    <div class="drop-zone" id="dropZone">
        <p>আপনার PDF ফাইলটি ড্র্যাগ করে ছাড়ুন অথবা ক্লিক করুন</p>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        <div id="fileName" style="margin-top: 10px; font-weight: bold;"></div>
    </div>
    <div id="configArea" style="display:none; text-align: left;">
        <label>একটি স্ট্রং পাসওয়ার্ড দিন:</label>
        <input type="password" id="passInput" placeholder="Set PDF Open Password">
        <button id="submitBtn">ENCRYPT & LOCK PDF</button>
    </div>
    <div class="status" id="statusMsg"></div>
    <a href="/" class="back-link">← Back to Dashboard</a>
</div>
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const configArea = document.getElementById('configArea');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if(e.target.files.length > 0) handleFile(e.target.files[0]); });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#b2f5ea'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '#e6fffa');
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); if(e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); });

    function handleFile(file) {
        if (file.type !== "application/pdf") return alert("Only PDF supported!");
        selectedFile = file;
        fileName.innerText = `Selected: ${file.name}`;
        configArea.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    submitBtn.addEventListener('click', async () => {
        const password = document.getElementById('passInput').value;
        if(!password) return alert("Password cannot be empty.");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `locked_${selectedFile.name}`; a.click();

        } catch(e) { statusMsg.innerHTML = "<span style='color: red;'>Encryption Failed.</span>"; }
    });
</script>
</body>
</html>
