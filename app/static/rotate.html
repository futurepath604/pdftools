<!DOCTYPE html>
<html lang="en">
<head>

        h1 { color: #805ad5; margin-bottom: 10px; }

        .drop-zone:hover { background: #e9d8fd; }
        select, button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 1rem; }
        button { background: #805ad5; color: white; font-weight: bold; border: none; cursor: pointer; display: none; }
        button:hover { background: #6b46c1; }

</head>
<body>
<div class="container">
    <h1>🔄 Rotate PDF</h1>
    <p>পিডিএফ এর কোনো পেজ উল্টো থাকলে তা সরাসরি সোজা বা ঘুরিয়ে নিন।</p>
    <div class="drop-zone" id="dropZone">
        <p>আপনার PDF ফাইলটি ড্র্যাগ করে ছাড়ুন অথবা ক্লিক করুন</p>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        <div id="fileName" style="margin-top: 10px; font-weight: bold;"></div>
    </div>
    <div id="configArea" style="display:none; text-align: left;">
        <label>কত ডিগ্রি ঘুরাতে চান?</label>
        <select id="angleSelect">
            <option value="90">90° Right</option>
            <option value="180">180° Flip</option>
            <option value="270">90° Left (270°)</option>
        </select>
        <button id="submitBtn">ROTATE PDF</button>
    </div>
    <div class="status" id="statusMsg"></div>
    <a href="/" class="back-link">← Back to Dashboard</a>
</div>
<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const configArea = document.getElementById('configArea');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if(e.target.files.length > 0) handleFile(e.target.files[0]); });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#e9d8fd'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '#faf5ff');
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); if(e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); });

    function handleFile(file) {
        if (file.type !== "application/pdf") return alert("Only PDF supported!");
        selectedFile = file;
        fileName.innerText = `Selected: ${file.name}`;
        configArea.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    submitBtn.addEventListener('click', async () => {
        const angle = parseInt(document.getElementById('angleSelect').value);

        try {
            const response = await fetch('/api/modify-pdf', { method: 'POST', body: formData });[span_8](start_span)[span_8](end_span)
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `rotated_${selectedFile.name}`; a.click();

        } catch(e) { statusMsg.innerHTML = "<span style='color: red;'>Error.</span>"; }
    });
</script>
</body>
</html>
