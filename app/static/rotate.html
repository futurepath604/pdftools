<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate PDF - Secure PDF Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%); }
        .group:hover .group-hover\:opacity-100 { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between">

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2 text-indigo-600 font-bold text-xl"><span>🛠️ Secure PDF Tools</span></a>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-gray-600 hover:text-indigo-600 text-sm font-medium">Dashboard</a>
                    <div class="relative group inline-block text-left">
                        <button class="text-gray-600 hover:text-indigo-600 text-sm font-medium flex items-center space-x-1 focus:outline-none py-5">
                            <span>All Tools</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="absolute right-0 mt-0 w-56 rounded-xl shadow-lg bg-white ring-1 ring-black ring-opacity-5 divide-y divide-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                            <div class="py-1">
                                <a href="/compress" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">📉 Compress PDF</a>
                                <a href="/merge" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">🔀 Merge PDF</a>
                                <a href="/pdf-to-image" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">🖼️ PDF to Image</a>
                                <a href="/image-to-pdf" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">📸 Image to PDF</a>
                            </div>
                            <div class="py-1">
                                <a href="/split" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">✂️ Split PDF</a>
                                <a href="/rotate" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">🔄 Rotate PDF</a>
                                <a href="/delete-pages" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">🗑️ Delete Pages</a>
                            </div>
                            <div class="py-1">
                                <a href="/lock" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">🔒 Lock PDF</a>
                                <a href="/unlock" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">🔓 Unlock PDF</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl w-full mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900">Rotate PDF</h1>
            <p class="mt-2 text-gray-500">Rotate pages inside your PDF document seamlessly.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-500 bg-gray-50">
                <input type="file" id="file-input" class="hidden" accept=".pdf">
                <div class="space-y-2">
                    <div class="text-indigo-500 text-4xl">🔄</div>
                    <div class="text-gray-600"><span class="font-medium text-indigo-600">Choose PDF</span> or drag it here</div>
                </div>
            </div>

            <div class="mt-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Rotation Angle:</label>
                <select id="angle" class="w-full bg-white border border-gray-300 rounded-xl px-4 py-2.5 text-gray-700 focus:ring-2 focus:ring-indigo-500">
                    <option value="90">90° Clockwise</option>
                    <option value="180">180° Flip</option>
                    <option value="270">270° Counter-Clockwise</option>
                </select>
            </div>

            <button id="rotate-btn" class="mt-6 w-full gradient-bg text-white py-3 rounded-xl font-medium shadow-md hover:opacity-90 disabled:opacity-50" disabled>
                Rotate PDF
            </button>

            <div id="status" class="mt-4 hidden p-4 rounded-xl text-sm font-medium"></div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-6 text-center text-sm text-gray-500">
        &copy; 2026 FFuture's Workspace. All rights reserved.
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const rotateBtn = document.getElementById('rotate-btn');
        const status = document.getElementById('status');
        let selectedFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-500'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-indigo-500'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });

        function handleFile(file) {
            if (file && file.type === 'application/pdf') {
                selectedFile = file;
                rotateBtn.disabled = false;
                showStatus(`Selected: ${file.name}`, 'success');
            }
        }

        rotateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            rotateBtn.disabled = true;
            rotateBtn.textContent = 'Processing...';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('mode', 'rotate');
            formData.append('params', JSON.stringify({ angle: parseInt(document.getElementById('angle').value) }));

            try {
                const response = await fetch('/api/modify-pdf', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Rotation failed.');
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rotated_${selectedFile.name}`;
                a.click();
                showStatus('Success! Rotated PDF downloaded.', 'success');
            } catch (err) {
                showStatus(err.message, 'error');
            } finally {
                rotateBtn.disabled = false;
                rotateBtn.textContent = 'Rotate PDF';
            }
        });

        function showStatus(msg, type) {
            status.classList.remove('hidden');
            status.textContent = msg;
            status.className = `mt-4 p-4 rounded-xl text-sm font-medium ${type === 'success' ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`;
        }
    </script>
</body>
</html>
