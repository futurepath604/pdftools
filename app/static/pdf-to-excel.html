<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel Converter</title>
    <!-- FontAwesome Buttons Setup -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* All Tools Menu Styling (Fixing visibility issues) */
        .tools-dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 9999; /* Higher z-index to make sure it shows */
            border-radius: 4px;
        }
        .tools-dropdown:hover .dropdown-content {
            display: block; /* Shows on hover, change to JS trigger if needed */
        }
        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover { background-color: #f1f1f1; }

        /* Drag & Drop Area */
        .drop-zone {
            border: 2px dashed #0078d4;
            padding: 40px;
            text-align: center;
            background: #f3f2f1;
            cursor: pointer;
            border-radius: 8px;
            margin: 20px 0;
        }
        .drop-zone.drag-over {
            background: #e1dfdd;
            border-color: #107c41;
        }
        .cloud-buttons {
            margin-top: 15px;
        }
        .btn-cloud {
            padding: 8px 15px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-google { background: #4285F4; color: white; }
        .btn-onedrive { background: #0078d4; color: white; }
    </style>
</head>
<body>

    <!-- 1. FIXED ALL TOOLS MENU -->
    <div class="tools-dropdown">
        <button class="dropbtn">All Tools <i class="fas fa-caret-down"></i></button>
        <div class="dropdown-content" id="allToolsMenu">
            <!-- Ensure these links exist and aren't hidden by CSS -->
            <a href="#"><i class="fas fa-file-excel"></i> PDF to Excel</a>
            <a href="#"><i class="fas fa-file-word"></i> PDF to Word</a>
            <a href="#"><i class="fas fa-image"></i> PDF to JPG</a>
            <a href="#"><i class="fas fa-compress"></i> Compress PDF</a>
        </div>
    </div>

    <!-- 2. DRAG & DROP BOX WITH CLOUD OPTION -->
    <div class="drop-zone" id="dropZone">
        <i class="fas fa-cloud-upload-alt fa-3x" style="color: #0078d4;"></i>
        <p>Drag & drop your PDF file here, or click to browse</p>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        
        <div class="cloud-buttons">
            <button class="btn-cloud btn-google" onclick="openGooglePicker()"><i class="fab fa-google-drive"></i> Google Drive</button>
            <button class="btn-cloud btn-onedrive" onclick="openOneDrivePicker()"><i class="fas fa-cloud"></i> OneDrive</button>
        </div>
    </div>

    <script>
        // --- Drag and Drop Feature ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        ['dragleave', 'drop'].forEach(event => {
            dropZone.addEventListener(event, () => dropZone.classList.remove('drag-over'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if(files.length > 0 && files[0].type === "application/pdf") {
                handleFileSelect(files[0]);
            } else {
                alert("Please drop a valid PDF file.");
            }
        });

        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            console.log("Selected file:", file.name);

        }

</body>
</html>
