<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF - SecurePDF</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-100">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-2xl font-black text-indigo-600 flex items-center gap-2">
                <i class="fa-solid fa-file-pdf"></i> SecurePDF
            </a>
            <div class="flex gap-4">
                <a href="/compress" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 px-1 py-4">Compress</a>
                <a href="/merge" class="text-slate-600 hover:text-indigo-600 font-medium px-1 py-4 transition">Merge</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-xl mx-auto px-4 py-12 w-full flex-grow flex flex-col justify-center">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fa-solid fa-file-arrow-down"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">Compress PDF File</h1>
                <p class="text-slate-500 mt-2 text-sm">Select from our multi-scale compression levels</p>
            </div>

            <!-- Upload Box Form -->
            <form id="compressForm" class="space-y-6">
                <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-indigo-500 cursor-pointer transition bg-slate-50/50">
                    <input type="file" id="fileInput" name="file" accept=".pdf" class="hidden" required>
                    <div id="uploadPrompt">
                        <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-400 mb-3"></i>
                        <p class="text-sm font-medium text-slate-700">Click to upload or drag & drop</p>
                        <p class="text-xs text-slate-400 mt-1">PDF file up to 25MB</p>
                    </div>
                    <div id="fileInfo" class="hidden">
                        <i class="fa-solid fa-file-pdf text-4xl text-indigo-500 mb-2"></i>
                        <p id="fileName" class="text-sm font-semibold text-slate-800 truncate"></p>
                        <p id="fileSize" class="text-xs text-slate-400 mt-0.5"></p>
                    </div>
                </div>

                <!-- 🎚️ MULTI-SCALE COMPRESSION OPTIONS -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Compression Level</label>
                    <select name="quality" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500 shadow-sm cursor-pointer">
                        <option value="medium">Recommended Compression (Balanced Size & Quality)</option>
                        <option value="high">Extreme Compression (Smallest File Size, Low Image Quality)</option>
                        <option value="low">Low Compression (High Image Quality, Less Size Reduction)</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-md shadow-indigo-100 flex items-center justify-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-bolt"></i> Compress PDF
                </button>
            </form>

            <!-- Progress Bar Container -->
            <div id="progressContainer" class="hidden mt-6 space-y-2">
                <div class="flex justify-between text-xs font-semibold text-indigo-600">
                    <span id="progressStatus">Downsampling and compressing assets...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-indigo-600 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-xs text-slate-400 border-t border-slate-100 bg-white">
        &copy; 2026 SecurePDF. All data processed strictly in-memory.
    </footer>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const form = document.getElementById('compressForm');
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                fileName.innerText = file.name;
                fileSize.innerText = (file.size / (1024 * 1024)).toFixed(2) + " MB";
                uploadPrompt.classList.add('hidden');
                fileInfo.classList.remove('hidden');
                dropZone.classList.add('border-indigo-500', 'bg-indigo-50/10');
            }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            if(!fileInput.files[0]) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> Processing...`;
            progressContainer.classList.remove('hidden');
            
            let p = 0;
            const timer = setInterval(() => {
                if(p < 90) {
                    p += Math.floor(Math.random() * 8) + 2;
                    if(p > 90) p = 90;
                    progressBar.style.width = p + '%';
                    progressPercent.innerText = p + '%';
                }
            }, 400);

            const formData = new FormData(form);
            try {
                const response = await fetch('/api/compress', {
                    method: 'POST',
                    body: formData
                });

                if(!response.ok) throw new Error('Compression failed.');

                clearInterval(timer);
                progressBar.style.width = '100%';
                progressPercent.innerText = '100%';
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "compressed_" + fileInput.files[0].name;
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                setTimeout(() => {
                    alert('Successfully Compressed!');
                    location.reload();
                }, 500);

            } catch (err) {
                clearInterval(timer);
                alert('Server Error: Compression could not be completed.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> Compress PDF`;
                progressContainer.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
