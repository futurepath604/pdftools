<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image - Secure PDF Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-family-papers/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-height-screen flex flex-col justify-between">

    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-2 text-indigo-600 font-bold text-xl">
                        <span>🛠️ Secure PDF Tools</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-600 hover:text-indigo-600 text-sm font-medium">Dashboard</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">
                Convert PDF to Images
            </h1>
            <p class="mt-3 max-w-2xl mx-auto text-xl text-gray-500 sm:mt-4">
                Extract all pages from your PDF document into high-quality JPG/PNG images instantly.
            </p>
        </div>

        <!-- Tool Container -->
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <!-- Upload Box -->
            <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-500 transition-colors bg-gray-50">
                <input type="file" id="file-input" class="hidden" accept=".pdf">
                <div class="space-y-4">
                    <div class="text-indigo-500 text-5xl flex justify-center">
                        📄
                    </div>
                    <div class="text-gray-600">
                        <span class="font-medium text-indigo-600 hover:text-indigo-500">Click to upload</span> or drag and drop your PDF here
                    </div>
                    <p class="text-xs text-gray-400">Supports .pdf files up to 50MB</p>
                </div>
            </div>

            <!-- File Info (Hidden by default) -->
            <div id="file-info" class="hidden mt-6 p-4 bg-indigo-50 rounded-xl border border-indigo-100 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">📄</span>
                    <div>
                        <p id="file-name" class="text-sm font-semibold text-gray-700 truncate max-w-xs sm:max-w-md"></p>
                        <p id="file-size" class="text-xs text-gray-500"></p>
                    </div>
                </div>
                <button id="remove-file" class="text-gray-400 hover:text-red-500 transition-colors text-lg">✕</button>
            </div>

            <!-- Submit Button -->
            <button id="convert-btn" class="mt-6 w-full gradient-bg text-white py-3 px-6 rounded-xl font-medium shadow-md hover:opacity-90 transition-opacity focus:outline-none flex items-center justify-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <span>Convert to Images</span>
            </button>

            <!-- Status Alerts -->
            <div id="status-container" class="mt-4 hidden">
                <div id="status-message" class="p-4 rounded-xl text-sm font-medium"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-6 text-center text-sm text-gray-500">
        &copy; 2026 FFuture's Workspace. All rights reserved.
    </footer>

    <!-- Frontend Logic to Connect with Backend Router -->
    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const removeFile = document.getElementById('remove-file');
        const convertBtn = document.getElementById('convert-btn');
        const statusContainer = document.getElementById('status-container');
        const statusMessage = document.getElementById('status-message');

        let selectedFile = null;

        // Trigger Click Upload
        dropZone.addEventListener('click', () => fileInput.click());

        // Handle File Selection
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // Drag and Drop Events
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-indigo-50/50');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-indigo-50/50');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            if (files.length > 0 && files[0].type === 'application/pdf') {
                selectedFile = files[0];
                fileName.textContent = selectedFile.name;
                fileSize.textContent = (selectedFile.size / (1024 * 1024)).toFixed(2) + ' MB';
                
                fileInfo.classList.remove('hidden');
                dropZone.classList.add('hidden');
                convertBtn.disabled = false;
                hideStatus();
            } else {
                showStatus('Please upload a valid PDF file.', 'error');
            }
        }

        // Remove Selected File
        removeFile.addEventListener('click', (e) => {
            e.stopPropagation();
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            dropZone.classList.remove('hidden');
            convertBtn.disabled = true;
            hideStatus();
        });

        // Trigger API Call on Convert Button Click
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            setLoading(true);
            showStatus('Processing your PDF and rendering images... Please wait.', 'info');

            try {
                // আপনার backend API endpoint route
                const response = await fetch('/api/pdf-to-image', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'Failed to convert PDF.');
                }

                // File Download Response handling (Expects a ZIP containing images)
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace('.pdf', '_images.zip');
                document.body.appendChild(a);
                a.click();
                a.remove();

                showStatus('Conversion successful! Your download has started.', 'success');
            } catch (error) {
                showStatus(error.message, 'error');
            } finally {
                setLoading(false);
            }
        });

        function showStatus(msg, type) {
            statusContainer.classList.remove('hidden');
            statusMessage.textContent = msg;
            
            statusMessage.className = "p-4 rounded-xl text-sm font-medium ";
            if (type === 'success') {
                statusMessage.classList.add('bg-green-50', 'text-green-800', 'border', 'border-green-200');
            } else if (type === 'error') {
                statusMessage.classList.add('bg-red-50', 'text-red-800', 'border', 'border-red-200');
            } else {
                statusMessage.classList.add('bg-blue-50', 'text-blue-800', 'border', 'border-blue-200');
            }
        }

        function hideStatus() {
            statusContainer.classList.add('hidden');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                convertBtn.disabled = true;
                convertBtn.innerHTML = '<span>Processing...</span>';
            } else {
                convertBtn.disabled = false;
                convertBtn.innerHTML = '<span>Convert to Images</span>';
            }
        }
    </script>
</body>
</html>
